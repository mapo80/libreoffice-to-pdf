name: "Test NuGet: Linux x64"

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # Ensure v prefix for release download
          [[ "$TAG" != v* ]] && TAG="v$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Native deps (fontconfig, freetype, cairo, etc.) are now bundled in the NuGet package.
          # Only locales needed for en_US.UTF-8 setup.
          sudo apt-get install -y --no-install-recommends locales
          sudo sed -i '/en_US.UTF-8/s/^# //' /etc/locale.gen
          sudo locale-gen

      - name: Download NuGet packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p nupkgs
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern '*.nupkg' \
            --dir nupkgs/
          ls -lh nupkgs/

      - name: Configure local NuGet source
        run: |
          cat > example/nuget.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="../nupkgs" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Publish example project
        run: |
          dotnet publish example/Example.csproj \
            -c Release -r linux-x64 --no-self-contained \
            -p:SlimLOVersion=${{ steps.version.outputs.version }} \
            -o /tmp/app

      - name: Run DOCX to PDF conversion
        env:
          LANG: en_US.UTF-8
        run: |
          dotnet /tmp/app/Example.dll \
            tests/fixtures/rich_formatting.docx /tmp/output.pdf

      - name: Verify PDF output
        run: |
          if [ ! -f /tmp/output.pdf ]; then
            echo "FAIL: output.pdf not created"
            exit 1
          fi
          SIZE=$(stat -c%s /tmp/output.pdf)
          echo "PDF size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "FAIL: PDF too small ($SIZE bytes)"
            exit 1
          fi
          echo "PASS: PDF created successfully ($SIZE bytes)"

      # ---------------------------------------------------------------
      # Azure App Service simulation
      # App Service has: HOME on CIFS (/home), no system libs, no fonts.
      # SlimLO must work with only bundled libs and a local /tmp profile.
      # ---------------------------------------------------------------
      - name: "Test: App Service simulation (read-only HOME, no system libs)"
        env:
          LANG: en_US.UTF-8
          HOME: /tmp/appservice_sim_home
        run: |
          echo "=== Simulating Azure App Service environment ==="
          # Create a read-only HOME to simulate CIFS-mounted /home
          mkdir -p /tmp/appservice_sim_home
          chmod 555 /tmp/appservice_sim_home
          echo "HOME=$HOME (read-only: $(stat -c %a /tmp/appservice_sim_home))"

          # Remove system fontconfig/freetype to ensure bundled libs are used
          sudo apt-get remove -y libfontconfig1 libfreetype6 2>/dev/null || true
          echo "System fontconfig removed — only bundled libs available"

          # Run conversion with restricted environment
          dotnet /tmp/app/Example.dll \
            tests/fixtures/rich_formatting.docx /tmp/output_appservice.pdf

          # Verify output
          if [ ! -f /tmp/output_appservice.pdf ]; then
            echo "FAIL: App Service sim — PDF not created"
            exit 1
          fi
          SIZE=$(stat -c%s /tmp/output_appservice.pdf)
          echo "App Service sim: PDF $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "FAIL: App Service sim — PDF too small ($SIZE bytes)"
            exit 1
          fi
          echo "PASS: App Service simulation — PDF created ($SIZE bytes)"
