name: "Test NuGet: macOS arm64"

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # Ensure v prefix for release download
          [[ "$TAG" != v* ]] && TAG="v$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download NuGet packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p nupkgs
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern '*.nupkg' \
            --dir nupkgs/
          ls -lh nupkgs/

      - name: Configure local NuGet source
        run: |
          cat > example/nuget.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="../nupkgs" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Publish example project
        run: |
          dotnet publish example/Example.csproj \
            -c Release -r osx-arm64 --no-self-contained \
            -p:SlimLOVersion=${{ steps.version.outputs.version }} \
            -o /tmp/app

      - name: Diagnose native binaries
        run: |
          echo "=== Published app contents ==="
          ls -la /tmp/app/runtimes/osx-arm64/native/ 2>/dev/null || echo "No runtimes dir"
          ls -la /tmp/app/program/ 2>/dev/null || echo "No program dir"

          # Find slimlo_worker and check RPATH
          WORKER=$(find /tmp/app -name slimlo_worker -type f | head -1)
          if [ -n "$WORKER" ]; then
            echo ""
            echo "=== slimlo_worker location: $WORKER ==="
            echo "--- RPATH ---"
            otool -l "$WORKER" | grep -A2 LC_RPATH || echo "No LC_RPATH found"
            echo "--- Linked libs ---"
            otool -L "$WORKER"
          else
            echo "WARNING: slimlo_worker not found!"
            find /tmp/app -type f | head -30
          fi

          # Find libslimlo and check RPATH
          SLIMLO=$(find /tmp/app -name 'libslimlo*.dylib' -not -name '*.dylib.*' -type f | head -1)
          if [ -n "$SLIMLO" ]; then
            echo ""
            echo "=== libslimlo location: $SLIMLO ==="
            echo "--- RPATH ---"
            otool -l "$SLIMLO" | grep -A2 LC_RPATH || echo "No LC_RPATH found"
            echo "--- Linked libs ---"
            otool -L "$SLIMLO"
          fi

          # Check if libmergedlo exists
          MERGED=$(find /tmp/app -name 'libmergedlo*' -type f | head -1)
          if [ -n "$MERGED" ]; then
            echo ""
            echo "=== libmergedlo location: $MERGED ==="
            echo "--- RPATH ---"
            otool -l "$MERGED" | grep -A2 LC_RPATH || echo "No LC_RPATH found"
          else
            echo "WARNING: libmergedlo not found!"
          fi

          # Try launching worker directly to capture stderr
          echo ""
          echo "=== Direct worker launch test ==="
          PROG_DIR=$(dirname "$WORKER")
          echo "Program dir: $PROG_DIR"
          SAL_LOK_OPTIONS=unipoll DYLD_LIBRARY_PATH="$PROG_DIR" "$WORKER" --help 2>&1 || echo "Worker exited with code: $?"

          echo ""
          echo "=== Launch WITHOUT DYLD_LIBRARY_PATH ==="
          SAL_LOK_OPTIONS=unipoll "$WORKER" --help 2>&1 || echo "Worker exited with code: $?"

      - name: Run DOCX to PDF conversion
        env:
          SAL_LOK_OPTIONS: unipoll
        run: |
          dotnet /tmp/app/Example.dll \
            tests/fixtures/rich_formatting.docx /tmp/output.pdf

      - name: Verify PDF output
        run: |
          if [ ! -f /tmp/output.pdf ]; then
            echo "FAIL: output.pdf not created"
            exit 1
          fi
          SIZE=$(stat -f%z /tmp/output.pdf)
          echo "PDF size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "FAIL: PDF too small ($SIZE bytes)"
            exit 1
          fi
          echo "PASS: PDF created successfully ($SIZE bytes)"
