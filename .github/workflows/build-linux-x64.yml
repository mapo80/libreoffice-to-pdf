name: "Native Build: Linux x64"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space and add swap
        run: |
          # Remove large pre-installed packages to free disk space for swap
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/local/.ghcup
          sudo rm -rf /usr/local/share/chromium /usr/local/share/edge_driver
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli \
            microsoft-edge-stable google-chrome-stable firefox mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h /
          # Add 20 GB swap file (dd instead of fallocate — fallocate fails on some GHA runners)
          # LTO linking of libmergedlo needs 12-16 GB; swap prevents OOM kill
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=20480
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Memory after swap ==="
          free -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=-1

      - name: Build SlimLO
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.linux-x64
          load: true
          tags: slimlo-build
          build-args: |
            SCRIPTS_HASH=${{ hashFiles('scripts/*.sh', 'patches/*.sh', 'patches/*.postautogen') }}
            SLIMLO_DEP_STEP=7
            NPROC=2
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract artifacts
        run: |
          mkdir -p output
          docker run --rm -v $(pwd)/output:/output slimlo-build

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slimlo-linux-x64-reports
          path: |
            output/build-metadata.json
            output/size-report.json
            output/size-report.txt
          if-no-files-found: warn
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: slimlo-linux-x64
          path: output/
          retention-days: 30
